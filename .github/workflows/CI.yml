name: CI

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: crates/side-huddle-node

jobs:
  # ── Build native addon on each platform ────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest       # arm64 runner
            target: aarch64-apple-darwin
            artifact: side-huddle-node.darwin-arm64.node

          - os: macos-13           # last Intel runner
            target: x86_64-apple-darwin
            artifact: side-huddle-node.darwin-x64.node

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: side-huddle-node.linux-x64-gnu.node

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: side-huddle-node.win32-x64-msvc.node

    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: crates/side-huddle-node/${{ matrix.artifact }}
          if-no-files-found: error

  # ── Publish (runs only on version tags) ────────────────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    # id-token:write is required for npm provenance attestation.
    # provenance cryptographically links published packages to this exact
    # workflow run + commit, verifiable via `npm audit signatures`.
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: crates/side-huddle-node/artifacts

      - name: Move artifacts into place
        shell: bash
        run: |
          npx napi artifacts \
            --dir artifacts \
            --dist npm
        working-directory: crates/side-huddle-node

      - name: Generate index.js + index.d.ts
        run: npx napi prepublish -t npm --skip-gh-release
        working-directory: crates/side-huddle-node

      - name: Publish platform packages
        run: |
          for dir in npm/*/; do
            (cd "$dir" && npm publish --access public --provenance) || true
          done
        working-directory: crates/side-huddle-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --access public --provenance
        working-directory: crates/side-huddle-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── crates.io (trusted publishing — no stored token needed) ────────────
      - name: Authenticate with crates.io via OIDC
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-io-auth

      - name: Publish to crates.io
        run: cargo publish -p side-huddle
        working-directory: ${{ github.workspace }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
