name: CI

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: crates/side-huddle-node

jobs:
  # ── Build napi Node.js addon on each platform ─────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: side-huddle-node.darwin-arm64.node

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: side-huddle-node.linux-x64-gnu.node
            upload-loaders: true   # index.js + index.d.ts only needed from one job

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: side-huddle-node.win32-x64-msvc.node

    name: Build (node) — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: crates/side-huddle-node/${{ matrix.artifact }}
          if-no-files-found: error

      # Upload the generated index.js + index.d.ts from one job (Linux, fastest).
      # These are platform-independent so any single job is sufficient.
      - name: Upload JS loaders
        if: matrix.upload-loaders
        uses: actions/upload-artifact@v4
        with:
          name: node-loaders
          path: |
            crates/side-huddle-node/index.js
            crates/side-huddle-node/index.d.ts
          if-no-files-found: error

  # ── Build Python wheels on each platform ──────────────────────────────────
  build-python:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_28
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    name: Build (python) — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command:           build
          args:              --release --strip --out dist
          target:            ${{ matrix.target }}
          manylinux:         ${{ matrix.manylinux || 'off' }}
          working-directory: bindings/python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: bindings/python/dist/*.whl
          if-no-files-found: error

  # ── Publish (runs only on version tags) ───────────────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [build, build-python]
    if: startsWith(github.ref, 'refs/tags/v')

    # id-token:write — required for npm / crates.io / PyPI OIDC trusted publishing
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # ── npm ──────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 24       # npm trusted publishing requires Node 24+
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install

      - name: Download .node artifacts
        uses: actions/download-artifact@v4
        with:
          path: crates/side-huddle-node/artifacts
          pattern: "side-huddle-node.*"

      - name: Download JS loaders (index.js + index.d.ts)
        uses: actions/download-artifact@v4
        with:
          name: node-loaders
          path: crates/side-huddle-node/

      - name: Move .node artifacts into npm/* platform dirs
        shell: bash
        run: |
          npx napi artifacts \
            --dir artifacts \
            --dist npm
        working-directory: crates/side-huddle-node

      - name: Publish platform packages
        run: |
          for dir in npm/*/; do
            (cd "$dir" && npm publish --access public --provenance) || true
          done
        working-directory: crates/side-huddle-node

      - name: Publish main package
        run: npm publish --access public --provenance
        working-directory: crates/side-huddle-node

      # ── crates.io (OIDC trusted publishing) ──────────────────────────────
      - name: Authenticate with crates.io via OIDC
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-io-auth

      - name: Publish to crates.io
        run: cargo publish -p side-huddle
        working-directory: ${{ github.workspace }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

      # ── PyPI (OIDC trusted publishing) ───────────────────────────────────
      - name: Download Python wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password= needed — uses OIDC trusted publishing
